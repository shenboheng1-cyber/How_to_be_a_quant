# ============================================================
# 宽基指数池
# 报告口径: "全体有ETF追踪的宽基指数" (截至2026-04-17共115支)
# 工程实现: 两种模式
#   mode: static  -> 用下面手工维护的核心池(先跑通)
#   mode: dynamic -> 由 ETF 全集反查其追踪指数, 自动生成宽基池(对齐报告)
# ============================================================

mode: static

benchmark: "000985.CSI"   # 中证全指

static_pool:
  - {code: "000300.SH", name: 沪深300}
  - {code: "000016.SH", name: 上证50}
  - {code: "000905.SH", name: 中证500}
  - {code: "000852.SH", name: 中证1000}
  - {code: "932000.CSI", name: 中证2000}
  - {code: "000510.CSI", name: 中证A500}
  - {code: "000050.SH", name: 上证50等权}   # 可删
  - {code: "000688.SH", name: 科创50}
  - {code: "000698.SH", name: 科创100}
  - {code: "399006.SZ", name: 创业板指}
  - {code: "399673.SZ", name: 创业板50}
  - {code: "399330.SZ", name: 深证100}
  - {code: "000010.SH", name: 上证180}
  - {code: "000906.SH", name: 中证800}
  - {code: "000922.SH", name: 中证红利}
  - {code: "000015.SH", name: 上证红利}
  - {code: "899050.BJ", name: 北证50}
  - {code: "000985.CSI", name: 中证全指}
  # TODO: dynamic 模式跑通后, 以 ETF 反查结果替换/扩充本列表

# dynamic 模式参数
dynamic:
  # 由全部股票型ETF的"跟踪标的指数代码"字段聚合得到指数全集,
  # 再人工/规则剔除行业、主题、Smart Beta(可选保留红利)指数
  exclude_keywords: [行业, 主题, 医药, 半导体, 芯片, 新能源, 军工, 白酒, 消费电子,
                     证券, 银行, 地产, 农业, 计算机, 传媒, 通信, 环保, 光伏, 煤炭,
                     有色, 钢铁, 化工, 机器人, 人工智能, 央企, 国企]
